<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Voice Gemma</title>
  <style>
    :root {
      --sidebar: #202123;
      --main: #343541;
      --surface: #40414f;
      --border: rgba(255, 255, 255, 0.12);
      --text: #ececf1;
      --muted: #8e8ea0;
      --accent: #19c37d;
      --danger: #ef4146;
      --user-bubble: #2f2f2f;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--main);
      color: var(--text);
      overflow: hidden;
    }
    .app {
      display: flex;
      height: 100vh;
      width: 100%;
    }
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 8px;
    }
    .sidebar-brand {
      padding: 10px 12px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.875rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: rgba(255, 255, 255, 0.06); }
    .sidebar-foot {
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .field-mini label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
    }
    .field-mini input, .field-mini select, .field-mini textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #2a2a2a;
      color: var(--text);
      font-size: 0.8rem;
    }
    .field-mini textarea { min-height: 56px; resize: vertical; }
    .settings-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .settings-panel.open { max-height: 520px; overflow-y: auto; }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--main);
    }
    .topbar {
      height: 48px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 0.875rem;
      color: var(--muted);
    }
    #model-hint { font-size: 0.8rem; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 24px;
    }
    .messages-inner {
      max-width: 768px;
      margin: 0 auto;
      padding-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .msg-row {
      display: flex;
      width: 100%;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }
    .msg {
      max-width: min(85%, 640px);
      border-radius: 18px;
      padding: 12px 16px;
      line-height: 1.6;
      font-size: 0.9375rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      background: var(--user-bubble);
      color: var(--text);
    }
    .msg.assistant {
      background: transparent;
      color: var(--text);
    }
    .msg .role-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .compose-wrap {
      border-top: 1px solid var(--border);
      background: var(--main);
      padding: 12px 16px 20px;
    }
    .compose-inner { max-width: 768px; margin: 0 auto; }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text);
    }
    .chip button {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 2px;
    }
    .chip button:hover { color: var(--danger); }
    .compose-bar {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--surface);
      border: 1px solid #565869;
      border-radius: 26px;
      padding: 8px 12px;
      min-height: 52px;
    }
    .compose-bar textarea {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9375rem;
      resize: none;
      min-height: 24px;
      max-height: 200px;
      line-height: 1.5;
      padding: 8px 4px;
    }
    .compose-bar textarea:focus { outline: none; }
    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: rgba(255, 255, 255, 0.08); color: var(--text); }
    .icon-btn.recording {
      color: var(--danger);
      animation: pulse 1.2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
    .icon-btn.send {
      background: var(--text);
      color: #000;
      border-radius: 10px;
    }
    .icon-btn.send:hover { background: #fff; }
    .icon-btn.send:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .status {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 8px;
      min-height: 1.25em;
    }
    .status.err { color: var(--danger); }
    .status.ok { color: var(--accent); }
    #file-input { display: none; }
    audio#player {
      width: 100%;
      max-width: 768px;
      margin: 8px auto 0;
      display: none;
      border-radius: 8px;
    }
    @media (max-width: 768px) {
      .sidebar { width: 72px; min-width: 72px; padding: 8px; }
      .sidebar-brand, .nav-btn span, .sidebar-foot .field-mini { display: none; }
      .nav-btn { justify-content: center; padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-brand">Voice Gemma</div>
      <button type="button" class="nav-btn" id="btn-new" title="New chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        <span>New chat</span>
      </button>
      <button type="button" class="nav-btn" id="btn-settings-toggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2"/></svg>
        <span>Settings</span>
      </button>
      <div class="settings-panel" id="settings-panel">
        <div class="field-mini" style="margin-top:8px">
          <label>LM Studio URL</label>
          <input id="cfg-lm-url" type="text" autocomplete="off" />
        </div>
        <div class="field-mini">
          <label>API key</label>
          <input id="cfg-api-key" type="password" autocomplete="off" />
        </div>
        <div class="field-mini">
          <label>Model id</label>
          <input id="cfg-model" type="text" autocomplete="off" />
        </div>
        <div class="field-mini">
          <label>Whisper</label>
          <select id="cfg-whisper">
            <option value="tiny">tiny</option>
            <option value="base">base</option>
            <option value="small" selected>small</option>
            <option value="medium">medium</option>
            <option value="large-v3">large-v3</option>
          </select>
        </div>
        <div class="field-mini">
          <label>Device</label>
          <select id="cfg-device">
            <option value="auto" selected>auto</option>
            <option value="cpu">cpu</option>
            <option value="cuda">cuda</option>
          </select>
        </div>
        <div class="field-mini">
          <label>Language (STT / TTS)</label>
          <input id="input-lang" type="text" placeholder="en" />
        </div>
        <div class="field-mini">
          <label>Voice transcript</label>
          <textarea id="input-voice" placeholder="Filled after recording…"></textarea>
        </div>
        <div class="field-mini">
          <label>System prompt</label>
          <textarea id="cfg-system"></textarea>
        </div>
        <button type="button" class="nav-btn" id="btn-save-cfg" style="margin-top:8px"><span>Save settings</span></button>
      </div>
      <div class="sidebar-foot">
        <span>Troubleshooting: start <strong>LM Studio → Local Server</strong>. Port in Settings must match (often 1234).</span>
        <span>If you see text but no sound, check internet (edge-tts) or the red status line.</span>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <span id="model-hint"></span>
      </div>
      <div class="messages" id="messages-scroll">
        <div class="messages-inner" id="chat-feed"></div>
      </div>
      <div class="compose-wrap">
        <div class="compose-inner">
          <audio id="player" controls></audio>
          <div class="chips" id="attach-chips" hidden></div>
          <div class="compose-bar">
            <input type="file" id="file-input" multiple />
            <button type="button" class="icon-btn" id="btn-attach" title="Attach files" aria-label="Attach files">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <textarea id="input-text" rows="1" placeholder="Message…"></textarea>
            <button type="button" class="icon-btn" id="btn-mic" title="Voice" aria-label="Record voice">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>
            </button>
            <button type="button" class="icon-btn send" id="btn-send" title="Send" aria-label="Send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4l-8 8h5v8h6v-8h5L12 4z"/></svg>
            </button>
          </div>
          <div class="status" id="status"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const LS = { lm_url:"vg_lm_url", api_key:"vg_api_key", model:"vg_model", whisper:"vg_whisper", device:"vg_device", system:"vg_system", lang:"vg_lang" };
    let pendingFiles = [];

    function loadCfg() {
      $("cfg-lm-url").value = localStorage.getItem(LS.lm_url) || "http://127.0.0.1:1234/v1";
      $("cfg-api-key").value = localStorage.getItem(LS.api_key) || "";
      $("cfg-model").value = localStorage.getItem(LS.model) || "nomic-ai/nomic-embed-text-v1.5-gguf/gemma-4-26b-a4b-it-ud-q4_k_m.gguf";
      $("cfg-whisper").value = localStorage.getItem(LS.whisper) || "small";
      $("cfg-device").value = localStorage.getItem(LS.device) || "auto";
      $("cfg-system").value = localStorage.getItem(LS.system) || "";
      $("input-lang").value = localStorage.getItem(LS.lang) || "en";
      $("model-hint").textContent = $("cfg-model").value.split("/").pop() || "";
    }
    function saveCfg() {
      localStorage.setItem(LS.lm_url, $("cfg-lm-url").value.trim());
      localStorage.setItem(LS.api_key, $("cfg-api-key").value);
      localStorage.setItem(LS.model, $("cfg-model").value.trim());
      localStorage.setItem(LS.whisper, $("cfg-whisper").value);
      localStorage.setItem(LS.device, $("cfg-device").value);
      localStorage.setItem(LS.system, $("cfg-system").value.trim());
      localStorage.setItem(LS.lang, $("input-lang").value.trim());
      $("model-hint").textContent = $("cfg-model").value.split("/").pop() || "";
      setStatus("Settings saved.", "ok");
    }
    function setStatus(msg, cls) {
      const el = $("status");
      el.textContent = msg || "";
      el.className = "status" + (cls ? " " + cls : "");
    }
    function apiErrorDetail(j) {
      if (!j) return "Unknown error";
      if (typeof j.detail === "string") return j.detail;
      if (Array.isArray(j.detail))
        return j.detail.map((x) => (x.msg ? x.msg : JSON.stringify(x))).join("; ");
      return JSON.stringify(j.detail || j);
    }
    function scrollBottom() {
      const m = $("messages-scroll");
      m.scrollTop = m.scrollHeight;
    }
    function addMessage(role, text) {
      const feed = $("chat-feed");
      const row = document.createElement("div");
      row.className = "msg-row " + role;
      const box = document.createElement("div");
      box.className = "msg " + role;
      const lab = document.createElement("div");
      lab.className = "role-label";
      lab.textContent = role === "user" ? "You" : "Assistant";
      const body = document.createElement("div");
      body.textContent = text;
      box.appendChild(lab);
      box.appendChild(body);
      row.appendChild(box);
      feed.appendChild(row);
      scrollBottom();
    }
    function renderChips() {
      const wrap = $("attach-chips");
      wrap.innerHTML = "";
      if (!pendingFiles.length) {
        wrap.hidden = true;
        return;
      }
      wrap.hidden = false;
      pendingFiles.forEach((f, i) => {
        const c = document.createElement("div");
        c.className = "chip";
        c.appendChild(document.createTextNode(f.name));
        const x = document.createElement("button");
        x.type = "button";
        x.textContent = "×";
        x.onclick = () => { pendingFiles.splice(i, 1); renderChips(); };
        c.appendChild(x);
        wrap.appendChild(c);
      });
    }
    $("btn-attach").onclick = () => $("file-input").click();
    $("file-input").onchange = (e) => {
      const list = e.target.files;
      if (!list) return;
      for (let i = 0; i < list.length; i++) pendingFiles.push(list[i]);
      e.target.value = "";
      renderChips();
    };

    $("btn-settings-toggle").onclick = () => $("settings-panel").classList.toggle("open");
    $("btn-save-cfg").onclick = saveCfg;
    $("btn-new").onclick = () => {
      $("chat-feed").innerHTML = "";
      $("input-text").value = "";
      pendingFiles = [];
      renderChips();
      setStatus("", "");
    };

    $("input-text").addEventListener("input", function () {
      this.style.height = "auto";
      this.style.height = Math.min(this.scrollHeight, 200) + "px";
    });

    $("input-text").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        $("btn-send").click();
      }
    });

    let mediaRecorder = null, audioChunks = [], audioStream = null, recording = false;
    $("btn-mic").onclick = async () => {
      if (!recording) {
        try {
          audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (e) {
          setStatus("Microphone permission denied.", "err");
          return;
        }
        const mime = MediaRecorder.isTypeSupported("audio/webm;codecs=opus") ? "audio/webm;codecs=opus" : "audio/webm";
        mediaRecorder = new MediaRecorder(audioStream, { mimeType: mime });
        audioChunks = [];
        mediaRecorder.ondataavailable = (e) => { if (e.data.size) audioChunks.push(e.data); };
        mediaRecorder.start();
        recording = true;
        $("btn-mic").classList.add("recording");
        setStatus("Recording…", "");
      } else {
        recording = false;
        $("btn-mic").classList.remove("recording");
        setStatus("Transcribing…", "");
        await new Promise((r) => { mediaRecorder.onstop = r; mediaRecorder.stop(); });
        if (audioStream) { audioStream.getTracks().forEach((t) => t.stop()); audioStream = null; }
        const blob = new Blob(audioChunks, { type: "audio/webm" });
        const fd = new FormData();
        fd.append("file", blob, "rec.webm");
        const lang = $("input-lang").value.trim();
        if (lang) fd.append("language", lang);
        fd.append("whisper_model", $("cfg-whisper").value);
        fd.append("device", $("cfg-device").value);
        fd.append("compute_type", "int8");
        try {
          const r = await fetch("/api/transcribe", { method: "POST", body: fd });
          const j = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(apiErrorDetail(j) || r.statusText);
          $("input-voice").value = j.text || "";
          setStatus("Transcription done. (" + (j.language || "?") + ")", "ok");
        } catch (e) {
          setStatus(String(e.message || e), "err");
        }
      }
    };

    async function playTts(text, voice) {
      const fd = new FormData();
      fd.append("text", text);
      fd.append("voice", voice);
      const r = await fetch("/api/tts", { method: "POST", body: fd });
      if (!r.ok) throw new Error(await r.text() || "TTS failed");
      const blob = await r.blob();
      const player = $("player");
      player.src = URL.createObjectURL(blob);
      player.style.display = "block";
      player.play().catch(() => {});
    }

    $("btn-send").onclick = async () => {
      saveCfg();
      const typed = $("input-text").value.trim();
      const voiceText = $("input-voice").value.trim();
      if (!typed && !voiceText && !pendingFiles.length) {
        setStatus("Add a message, voice note, or attachment.", "err");
        return;
      }
      const displayParts = [];
      if (typed) displayParts.push(typed);
      if (voiceText) displayParts.push("[Voice: " + voiceText + "]");
      if (pendingFiles.length) displayParts.push("[Attachments: " + pendingFiles.map((f) => f.name).join(", ") + "]");
      addMessage("user", displayParts.join("\n\n") || "(empty)");
      setStatus("Thinking…", "");

      const fd = new FormData();
      fd.append("typed", typed || "");
      fd.append("voice_text", voiceText || "");
      fd.append("language", $("input-lang").value.trim() || "");
      fd.append("system_prompt", $("cfg-system").value.trim() || "");
      fd.append("lm_url", $("cfg-lm-url").value.trim() || "");
      fd.append("api_key", $("cfg-api-key").value || "");
      fd.append("model_id", $("cfg-model").value.trim() || "");
      pendingFiles.forEach((f) => fd.append("files", f));
      const filesSnapshot = pendingFiles.slice();
      pendingFiles = [];
      renderChips();

      try {
        const r = await fetch("/api/chat", { method: "POST", body: fd });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(apiErrorDetail(j));
        const replyText = j.reply != null && String(j.reply).trim() ? String(j.reply) : "(Empty reply from model)";
        addMessage("assistant", replyText);
        $("input-text").value = "";
        $("input-text").style.height = "auto";
        try {
          setStatus("Playing audio…", "ok");
          await playTts(replyText, j.tts_voice);
          setStatus("Ready.", "ok");
        } catch (audioErr) {
          setStatus("Reply received; audio failed: " + (audioErr.message || audioErr), "err");
        }
      } catch (e) {
        setStatus(String(e.message || e), "err");
        addMessage("assistant", "Error: " + (e.message || e));
        filesSnapshot.forEach((f) => pendingFiles.push(f));
        renderChips();
      }
    };

    loadCfg();
  </script>
</body>
</html>
