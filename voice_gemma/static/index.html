<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Voice Gemma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #050508;
      --bg1: #0c0c12;
      --glass: rgba(20, 20, 32, 0.65);
      --stroke: rgba(255, 255, 255, 0.09);
      --text: #ececf1;
      --muted: #8b8b9e;
      --violet: #8b5cf6;
      --cyan: #22d3ee;
      --rose: #fb7185;
      --ok: #34d399;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
      --radius: 20px;
      --font: "Vazirmatn", system-ui, sans-serif;
      --font-en: "Outfit", system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg0);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .aurora {
      position: fixed;
      inset: -40%;
      background:
        radial-gradient(ellipse 50% 40% at 70% 10%, rgba(139, 92, 246, 0.22), transparent 55%),
        radial-gradient(ellipse 45% 35% at 20% 80%, rgba(34, 211, 238, 0.15), transparent 50%),
        radial-gradient(ellipse 30% 25% at 90% 60%, rgba(251, 113, 133, 0.1), transparent 45%);
      pointer-events: none;
      z-index: 0;
    }
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,259,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 30%, black, transparent);
      pointer-events: none;
      z-index: 0;
    }
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 20px 48px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .brand h1 {
      font-family: var(--font-en);
      font-weight: 800;
      font-size: clamp(1.45rem, 4vw, 1.85rem);
      letter-spacing: -0.03em;
      background: linear-gradient(120deg, var(--text) 0%, var(--violet) 45%, var(--cyan) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .brand span {
      font-size: 0.82rem;
      color: var(--muted);
    }
    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button, .btn {
      font-family: var(--font);
      border: 1px solid var(--stroke);
      background: var(--glass);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      backdrop-filter: blur(16px);
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    button:hover, .btn:hover {
      border-color: rgba(139, 92, 246, 0.45);
      box-shadow: 0 0 24px rgba(139, 92, 246, 0.2);
    }
    button:active { transform: scale(0.97); }
    button.primary {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.35), rgba(34, 211, 238, 0.2));
      border-color: rgba(139, 92, 246, 0.5);
      font-weight: 600;
    }
    button.danger {
      border-color: rgba(251, 113, 133, 0.45);
      color: #fecdd3;
    }
    button.recording {
      animation: pulse-ring 1.2s ease-out infinite;
      border-color: var(--rose);
      color: #fecdd3;
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(251, 113, 133, 0.45); }
      70% { box-shadow: 0 0 0 14px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr min(380px, 100%);
      gap: 20px;
      flex: 1;
      align-items: stretch;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
    .panel {
      background: var(--glass);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 420px;
      overflow: hidden;
    }
    .panel-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--stroke);
      font-size: 0.88rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-head strong { color: var(--text); }
    .chat-feed {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: min(58vh, 640px);
    }
    .bubble {
      max-width: 92%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.65;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
      animation: fade-in 0.35s ease;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }
    .bubble.user {
      align-self: flex-start;
      background: linear-gradient(145deg, rgba(139, 92, 246, 0.22), rgba(20, 20, 32, 0.9));
      border: 1px solid rgba(139, 92, 246, 0.35);
    }
    .bubble.assistant {
      align-self: flex-end;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--stroke);
    }
    .bubble .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: var(--font-en);
    }
    .composer {
      padding: 18px;
      border-top: 1px solid var(--stroke);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    label.field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    textarea, input, select {
      font-family: var(--font);
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: rgba(0, 0, 0, 0.35);
      color: var(--text);
      padding: 12px 14px;
      font-size: 0.92rem;
      resize: vertical;
      min-height: 44px;
    }
    textarea { min-height: 96px; }
    textarea:focus, input:focus, select:focus {
      outline: none;
      border-color: rgba(139, 92, 246, 0.55);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .row > * { flex: 1; min-width: 120px; }
    .row .grow0 { flex: 0 0 auto; min-width: unset; }
    .settings {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.45s ease;
    }
    .settings.open {
      max-height: 1200px;
    }
    .settings-inner {
      padding: 18px;
      border-top: 1px solid var(--stroke);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .status {
      font-size: 0.85rem;
      color: var(--muted);
      min-height: 1.4em;
    }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--rose); }
    audio#player { width: 100%; margin-top: 8px; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="grid-bg"></div>
  <div class="wrap">
    <header>
      <div class="brand">
        <h1>Voice Gemma</h1>
        <span>LM Studio + Whisper + edge-tts — چندزبانه</span>
      </div>
      <div class="header-actions">
        <button type="button" id="btn-settings" class="btn">تنظیمات</button>
      </div>
    </header>

    <div class="layout">
      <section class="panel">
        <div class="panel-head">
          <span><strong>گفتگو</strong></span>
          <span id="model-hint" style="font-size:0.78rem;"></span>
        </div>
        <div class="chat-feed" id="chat-feed"></div>
        <div class="composer">
          <div class="status" id="status"></div>
          <audio id="player" controls style="display:none;"></audio>
          <div class="row">
            <button type="button" class="primary grow0" id="btn-send">ارسال به مدل</button>
            <button type="button" class="grow0" id="btn-mic">ضبط صدا</button>
          </div>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-head">
          <span><strong>ورودی</strong></span>
          <span id="lang-detect" style="font-size:0.78rem;"></span>
        </div>
        <div style="padding:18px;display:flex;flex-direction:column;gap:14px;flex:1;">
          <label class="field">متن
            <textarea id="input-text" placeholder="اینجا تایپ کنید…"></textarea>
          </label>
          <label class="field">رونویسی ویس (قابل ویرایش)
            <textarea id="input-voice" placeholder="بعد از ضبط، اینجا پر می‌شود"></textarea>
          </label>
          <label class="field">زبان TTS / شنیدار (مثلاً fa یا en)
            <input id="input-lang" type="text" placeholder="fa" />
          </label>
          <p style="font-size:0.8rem;color:var(--muted);line-height:1.5;">
            نکته: LM Studio باید با Local Server روشن باشد (معمولاً پورت 1234). این UI روی پورت وب خودش اجرا می‌شود.
          </p>
        </div>
        <div class="settings" id="settings">
          <div class="settings-inner">
            <label class="field">LM Studio base URL
              <input id="cfg-lm-url" type="text" autocomplete="off" />
            </label>
            <label class="field">API key
              <input id="cfg-api-key" type="password" autocomplete="off" />
            </label>
            <label class="field">شناسه مدل
              <input id="cfg-model" type="text" autocomplete="off" />
            </label>
            <label class="field">Whisper (اندازه)
              <select id="cfg-whisper">
                <option value="tiny">tiny</option>
                <option value="base">base</option>
                <option value="small" selected>small</option>
                <option value="medium">medium</option>
                <option value="large-v3">large-v3</option>
              </select>
            </label>
            <label class="field">دستگاه Whisper
              <select id="cfg-device">
                <option value="auto" selected>auto</option>
                <option value="cpu">cpu</option>
                <option value="cuda">cuda</option>
              </select>
            </label>
            <label class="field">پیام سیستم (اختیاری)
              <textarea id="cfg-system" style="min-height:72px;"></textarea>
            </label>
            <button type="button" class="primary" id="btn-save-cfg">ذخیره در مرورگر</button>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const LS = {
      lm_url: "vg_lm_url",
      api_key: "vg_api_key",
      model: "vg_model",
      whisper: "vg_whisper",
      device: "vg_device",
      system: "vg_system",
      lang: "vg_lang",
    };

    function loadCfg() {
      $("cfg-lm-url").value = localStorage.getItem(LS.lm_url) || "http://127.0.0.1:1234/v1";
      $("cfg-api-key").value = localStorage.getItem(LS.api_key) || "";
      $("cfg-model").value = localStorage.getItem(LS.model) || "nomic-ai/nomic-embed-text-v1.5-gguf/gemma-4-26b-a4b-it-ud-q4_k_m.gguf";
      $("cfg-whisper").value = localStorage.getItem(LS.whisper) || "small";
      $("cfg-device").value = localStorage.getItem(LS.device) || "auto";
      $("cfg-system").value = localStorage.getItem(LS.system) || "";
      $("input-lang").value = localStorage.getItem(LS.lang) || "fa";
      $("model-hint").textContent = $("cfg-model").value.split("/").pop() || "";
    }

    function saveCfg() {
      localStorage.setItem(LS.lm_url, $("cfg-lm-url").value.trim());
      localStorage.setItem(LS.api_key, $("cfg-api-key").value);
      localStorage.setItem(LS.model, $("cfg-model").value.trim());
      localStorage.setItem(LS.whisper, $("cfg-whisper").value);
      localStorage.setItem(LS.device, $("cfg-device").value);
      localStorage.setItem(LS.system, $("cfg-system").value.trim());
      localStorage.setItem(LS.lang, $("input-lang").value.trim());
      $("model-hint").textContent = $("cfg-model").value.split("/").pop() || "";
      setStatus("تنظیمات ذخیره شد.", "ok");
    }

    function setStatus(msg, cls) {
      const el = $("status");
      el.textContent = msg || "";
      el.className = "status" + (cls ? " " + cls : "");
    }

    function addBubble(role, text) {
      const feed = $("chat-feed");
      const div = document.createElement("div");
      div.className = "bubble " + (role === "user" ? "user" : "assistant");
      const label = document.createElement("div");
      label.className = "label";
      label.textContent = role === "user" ? "شما" : "Gemma";
      div.appendChild(label);
      const body = document.createElement("div");
      body.textContent = text;
      div.appendChild(body);
      feed.appendChild(div);
      feed.scrollTop = feed.scrollHeight;
    }

    $("btn-settings").onclick = () => {
      $("settings").classList.toggle("open");
    };
    $("btn-save-cfg").onclick = saveCfg;

    let mediaRecorder = null;
    let audioChunks = [];
    let audioStream = null;
    let recording = false;

    $("btn-mic").onclick = async () => {
      if (!recording) {
        try {
          audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (e) {
          setStatus("اجازه میکروفن داده نشد.", "err");
          return;
        }
        const opts = { mimeType: MediaRecorder.isTypeSupported("audio/webm;codecs=opus") ? "audio/webm;codecs=opus" : "audio/webm" };
        mediaRecorder = new MediaRecorder(audioStream, opts);
        audioChunks = [];
        mediaRecorder.ondataavailable = (e) => { if (e.data.size) audioChunks.push(e.data); };
        mediaRecorder.start();
        recording = true;
        $("btn-mic").classList.add("recording");
        $("btn-mic").textContent = "توقف ضبط";
        setStatus("در حال ضبط…", "");
      } else {
        recording = false;
        $("btn-mic").classList.remove("recording");
        $("btn-mic").textContent = "ضبط صدا";
        setStatus("در حال رونویسی…", "");
        await new Promise((resolve) => {
          mediaRecorder.onstop = resolve;
          mediaRecorder.stop();
        });
        if (audioStream) {
          audioStream.getTracks().forEach((t) => t.stop());
          audioStream = null;
        }
        const blob = new Blob(audioChunks, { type: "audio/webm" });
        const fd = new FormData();
        fd.append("file", blob, "rec.webm");
        const lang = $("input-lang").value.trim() || null;
        if (lang) fd.append("language", lang);
        fd.append("whisper_model", $("cfg-whisper").value);
        fd.append("device", $("cfg-device").value);
        fd.append("compute_type", "int8");
        try {
          const r = await fetch("/api/transcribe", { method: "POST", body: fd });
          const j = await r.json();
          if (!r.ok) throw new Error(j.detail || r.statusText);
          $("input-voice").value = j.text || "";
          $("lang-detect").textContent = j.language ? ("زبان: " + j.language) : "";
          setStatus("رونویسی انجام شد.", "ok");
        } catch (e) {
          setStatus(String(e.message || e), "err");
        }
      }
    };

    async function playTts(text, voice) {
      const fd = new FormData();
      fd.append("text", text);
      fd.append("voice", voice);
      const r = await fetch("/api/tts", { method: "POST", body: fd });
      if (!r.ok) {
        const t = await r.text();
        throw new Error(t || "TTS failed");
      }
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const player = $("player");
      player.src = url;
      player.style.display = "block";
      player.play().catch(() => {});
    }

    $("btn-send").onclick = async () => {
      saveCfg();
      const typed = $("input-text").value.trim();
      const voiceText = $("input-voice").value.trim();
      if (!typed && !voiceText) {
        setStatus("متن یا ویس لازم است.", "err");
        return;
      }
      const payload = {
        typed: typed || null,
        voice_text: voiceText || null,
        language: $("input-lang").value.trim() || null,
        tts_voice: null,
        system_prompt: $("cfg-system").value.trim() || null,
        lm_url: $("cfg-lm-url").value.trim() || null,
        api_key: $("cfg-api-key").value || null,
        model_id: $("cfg-model").value.trim() || null,
      };
      const displayUser = [typed, voiceText ? ("ویس: " + voiceText) : null].filter(Boolean).join("\n\n");
      addBubble("user", displayUser || "(خالی)");
      setStatus("در حال گفتگو با LM Studio…", "");
      try {
        const r = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(typeof j.detail === "string" ? j.detail : JSON.stringify(j.detail || j));
        addBubble("assistant", j.reply);
        setStatus("پخش صوت پاسخ…", "ok");
        await playTts(j.reply, j.tts_voice);
        setStatus("آماده.", "ok");
      } catch (e) {
        setStatus(String(e.message || e), "err");
        addBubble("assistant", "خطا: " + (e.message || e));
      }
    };

    loadCfg();
    saveCfg();
  </script>
</body>
</html>
